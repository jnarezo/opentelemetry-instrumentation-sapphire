name: Release

on:
  push:
    tags:
      - 'v*'
      - '!v*-rc*'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: 'pnpm'
      - run: pnpm ci
      - run: pnpm lint
  publish:
    name: Publish
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm ci
      - run: pnpm publish --provenance