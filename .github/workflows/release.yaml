name: Release

on:
  push:
    branches: ['main']

jobs:
  process-release:
    name: Process Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          release-type: node