name: Release

on:
  push:
    branches: ['main']

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process-release:
    name: Process Release
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          release-type: node